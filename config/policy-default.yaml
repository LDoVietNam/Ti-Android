# ── Ti Android Runtime - Default Policy ──
version: 1
defaults:
  read_ui: allow
  open_app: allow
  navigate: allow
  type_draft: allow
  send_message: confirm
  publish_content: confirm
  share_file: confirm
  delete_content: deny
  account_change: deny
  bulk_message: deny
  financial_action: deny
  credential_action: deny
  otp_action: deny
limits:
  max_actions_per_task: 30
  max_retries_per_action: 2
  max_task_duration_seconds: 120
  max_remote_vision_calls: 3
